<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>modfield.js - showcase - isometric city</title>
    <script>
        (() => {
            const saved = localStorage.getItem('modfield-theme');
            const theme = saved === 'dark' || saved === 'light'
                ? saved
                : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/shared.css">
    <style>
        .page {
            max-width: 960px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
        }

        .heading {
            font-size: clamp(1.9rem, 4.5vw, 3.1rem);
        }

        .link-btn {
            border: 1px solid var(--accent-soft);
            background: var(--bg-elev);
            color: var(--text);
            border-radius: 999px;
            font: 600 0.9rem "Manrope", sans-serif;
            padding: 10px 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .link-btn:hover {
            border-color: var(--accent);
        }

        .panel {
            border: 1px solid var(--accent-soft);
            border-radius: 18px;
            padding: 18px;
            background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
            box-shadow: var(--card-shadow);
        }

        .panel h2 {
            margin: 0 0 10px;
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(1.5rem, 3vw, 2.1rem);
        }

        .panel p {
            margin: 0;
            color: var(--muted);
            line-height: 1.6;
        }

        @media (max-width: 800px) {
            body {
                padding: 16px;
            }

            .topbar {
                flex-wrap: wrap;
            }

            .actions {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="topbar">
            <h1 class="heading"><a href="../">modfield.js</a></h1>
            <div class="actions">
                <a class="link-btn" href="../">&larr; all showcases</a>
                <a class="link-btn" href="../../">demo</a>
                <a class="link-btn" href="../../docs/">documentation</a>
                <button type="button" id="theme-toggle" aria-label="Toggle theme"></button>
            </div>
        </div>

        <section class="panel">
            <h2>Showcase page scaffold</h2>
            <p>This page is ready for the isometric city implementation. You can now drop in the sketch canvas and project notes while keeping consistent navigation and theme behavior.</p>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sunSvg = 'https://www.svgrepo.com/show/432431/clear-day.svg';
        const moonSvg = 'https://www.svgrepo.com/show/432516/moon.svg';

        function isDarkMode() {
            return document.documentElement.getAttribute('data-theme') === 'dark';
        }

        function updateThemeToggleIcon(theme) {
            const showMoon = theme === 'light';
            const iconUrl = showMoon ? moonSvg : sunSvg;
            const nextModeLabel = showMoon ? 'dark' : 'light';
            const modeClass = showMoon ? 'moon-mode' : 'sun-mode';
            themeToggle.innerHTML = `<img src="${iconUrl}" alt="" class="theme-icon ${modeClass}" width="18" height="18">`;
            themeToggle.setAttribute('aria-label', `Switch to ${nextModeLabel} mode`);
            themeToggle.setAttribute('title', `Switch to ${nextModeLabel} mode`);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
            localStorage.setItem('modfield-theme', theme);
            updateThemeToggleIcon(theme);
        }

        updateThemeToggleIcon(isDarkMode() ? 'dark' : 'light');

        themeToggle.addEventListener('click', () => {
            const current = isDarkMode() ? 'dark' : 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>
</html>
