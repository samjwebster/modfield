<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sketchy Surface Showcase - modfield.js</title>
    <link rel="icon" type="image/png" href="../../favicon.png">
    <script>
        (() => {
            const saved = localStorage.getItem('modfield-theme');
            const theme = saved === 'dark' || saved === 'light'
                ? saved
                : (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');

            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/shared.css">
    <style>
        body {
            padding: 16px;
            margin: 0;
            min-height: 100vh;
        }

        .page {
            width: 100%;
            margin: 0 auto;
            display: grid;
            gap: 18px;
            min-height: calc(100vh - 32px);
            grid-template-rows: auto 1fr;
        }

        .heading {
            font-size: clamp(1.9rem, 4.5vw, 3.1rem);
        }

        .link-btn {
            border: 1px solid var(--accent-soft);
            background: var(--bg-elev);
            color: var(--text);
            border-radius: 999px;
            font: 600 0.9rem "Manrope", sans-serif;
            padding: 10px 16px;
            cursor: pointer;
            text-decoration: none;
        }

        .link-btn:hover {
            border-color: var(--accent);
        }

        .panel {
            border: 1px solid var(--accent-soft);
            border-radius: 18px;
            padding: 18px;
            background: color-mix(in srgb, var(--bg-elev) 92%, transparent);
            box-shadow: var(--card-shadow);
            display: grid;
            grid-template-rows: auto 1fr;
            min-height: 0;
        }

        .panel h2 {
            margin: 0;
            font-family: "Cormorant Garamond", serif;
            font-size: clamp(1.5rem, 3vw, 2.1rem);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .canvas-wrap {
            border-radius: 16px;
            border: 1px solid var(--accent-soft);
            overflow: hidden;
            background: color-mix(in srgb, var(--bg-elev) 85%, transparent);
            min-height: 0;
        }

        #canvas_container {
            width: 100%;
            height: 100%;
            min-height: 0;
        }

        #canvas_container canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        @media (max-width: 800px) {
            body {
                padding: 12px;
            }

            .page {
                min-height: calc(100vh - 24px);
            }

            .actions {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <div class="topbar">
            <h1 class="heading"><a href="../">modfield.js</a></h1>
            <div class="actions">
                <a class="link-btn" href="../">&larr; all showcases</a>
                <a class="link-btn" href="../../">demo</a>
                <a class="link-btn" href="../../docs/">documentation</a>
                <button type="button" id="theme-toggle" aria-label="Toggle theme"></button>
            </div>
        </div>

        <section class="panel">
            <div class="controls">
                <h2>Sketchy Surface</h2>
                <button type="button" class="link-btn" id="reset-button">regenerate</button>
            </div>
            <div class="canvas-wrap">
                <div id="canvas_container" aria-label="Sketchy surface canvas"></div>
            </div>
        </section>
    </main>

    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const sunSvg = 'https://www.svgrepo.com/show/432431/clear-day.svg';
        const moonSvg = 'https://www.svgrepo.com/show/432516/moon.svg';

        function isDarkMode() {
            return document.documentElement.getAttribute('data-theme') === 'dark';
        }

        function updateThemeToggleIcon(theme) {
            const showMoon = theme === 'light';
            const iconUrl = showMoon ? moonSvg : sunSvg;
            const nextModeLabel = showMoon ? 'dark' : 'light';
            const modeClass = showMoon ? 'moon-mode' : 'sun-mode';
            themeToggle.innerHTML = `<img src="${iconUrl}" alt="" class="theme-icon ${modeClass}" width="18" height="18">`;
            themeToggle.setAttribute('aria-label', `Switch to ${nextModeLabel} mode`);
            themeToggle.setAttribute('title', `Switch to ${nextModeLabel} mode`);
        }

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.style.colorScheme = theme;
            localStorage.setItem('modfield-theme', theme);
            updateThemeToggleIcon(theme);
        }

        updateThemeToggleIcon(isDarkMode() ? 'dark' : 'light');

        themeToggle.addEventListener('click', () => {
            const current = isDarkMode() ? 'dark' : 'light';
            setTheme(current === 'dark' ? 'light' : 'dark');
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <script src="../../dist/modfield.umd.js"></script>
    <script src="./sketch.js"></script>
    
</body>
</html>
